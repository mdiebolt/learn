<!doctype html>

<html lang="en">

  <head>

    <title>Browser not supported · Learn</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap">

    <link rel="icon" href="/icon.png" type="image/png">

    <style>

      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        background: #000;
        color: #fff;
        display: grid;
        font-family: "Geist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100dvh;
        place-items: center;
        padding: 1.5rem;
        text-rendering: optimizeLegibility;
      }

      main {
        max-width: 32rem;
        width: 100%;
      }

      .label {
        color: rgba(255, 255, 255, 0.4);
        font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        font-size: 0.6875rem;
        font-weight: 400;
        letter-spacing: 0.025em;
        margin-bottom: 0.75rem;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2.25rem, 6vw, 3rem);
        font-weight: 500;
        letter-spacing: -0.025em;
        line-height: 1.1;
        margin-bottom: 1.5rem;
      }

      p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 1rem;
        margin-bottom: 2.5rem;
      }

    </style>

  </head>

  <body>

    <!-- This file lives in public/406-unsupported-browser.html -->

    <main>
      <div class="label">// error 406</div>
      <h1>Browser not supported</h1>
      <p>Your browser is out of date. Please upgrade to a current version of Chrome, Safari, Firefox, or Edge to continue.</p>
    </main>

  </body>

</html>

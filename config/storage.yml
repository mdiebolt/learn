test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Set AWS credentials via `bin/rails credentials:edit`:
#
#   aws:
#     access_key_id: ...
#     secret_access_key: ...
#     region: us-east-1
#     bucket: learn-audiobooks-production
#
# CORS on the bucket needs to allow PUT from the app's origin so direct uploads work.
amazon:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
  region: <%= Rails.application.credentials.dig(:aws, :region) || "us-east-1" %>
  bucket: <%= Rails.application.credentials.dig(:aws, :bucket) %>
